---
name: "Feature request"
description: "Suggest an idea for the Clawdmeter card"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: >-
        Before you open a new feature request, search the existing requests to
        see if someone already had the same idea.
  - type: checkboxes
    attributes:
      label: Checklist
      options:
        - label: I filled out this template to the best of my ability.
          required: true
        - label: This contains exactly one feature request.
          required: true
        # yamllint disable rule:line-length
        - label: "This is not a duplicate of an [existing request](https://github.com/corgan2222/lovelace-clawdmeter/issues?q=is%3Aissue+label%3Aenhancement)."
          # yamllint enable rule:line-length
          required: true
  - type: textarea
    attributes:
      label: "Is your feature request related to a problem? Please describe."
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Describe alternatives you've considered"
    validations:
      required: false
  - type: textarea
    attributes:
      label: "Additional context"
      description: "Add any other context, mockups or screenshots about the request here."
    validations:
      required: false
