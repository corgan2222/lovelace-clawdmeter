---
categories:
  - title: ":boom: Breaking Changes"
    label: "breaking"
  - title: ":rocket: Features"
    label: "enhancement"
  - title: ":fire: Removals and Deprecations"
    label: "removal"
  - title: ":beetle: Fixes"
    label: "bug"
  - title: ":racehorse: Performance"
    label: "performance"
  - title: ":rotating_light: Testing"
    label: "testing"
  - title: ":construction_worker: Continuous Integration"
    label: "ci"
  - title: ":books: Documentation"
    label: "documentation"
  - title: ":hammer: Refactoring"
    label: "refactoring"
  - title: ":lipstick: Style"
    label: "style"
  - title: ":package: Dependencies"
    labels:
      - "dependencies"
      - "build"
# Auto-apply a label to each PR from its branch prefix, so the release notes are
# categorised without manual labelling. Runs on pull_request (see the workflow).
autolabeler:
  - label: "enhancement"
    branch:
      - '/^feat(ure)?\//i'
  - label: "bug"
    branch:
      - '/^(fix|bugfix|hotfix)\//i'
  - label: "documentation"
    branch:
      - '/^docs?\//i'
  - label: "refactoring"
    branch:
      - '/^refactor\//i'
  - label: "ci"
    branch:
      - '/^(ci|chore|build)\//i'
  - label: "dependencies"
    branch:
      - '/^dependabot\//i'
template: |
  ## Overview of changes

  ## Changes

  $CHANGES
